version: "3.9"

services:
  driver-api:
    build: .
    container_name: driver-api
    ports:
      - "8000:8000"
    restart: no

  driver-dashboard:
    build: .
    container_name: driver-dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - driver-api
    environment:
      - API_URL=http://driver-api:8000
    restart: no
